name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  SKIP_ENV_VALIDATION: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run typechecks
        run: bun run typecheck

      - name: Run lints
        run: bun run lint
